<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/f840aaec68.js" crossorigin="anonymous"></script>
</head>
<body>
    <table>
        <caption>Horário Escolar <i class="fa-solid fa-pencil"></i></caption>
        <thead>
            <tr>
                <th class="clock" scope="col"><i class="fa-regular fa-clock"></i></th>
                <th class="day1" scope="col">Segunda</th>
                <th class="day2" scope="col">Terça</th>
                <th class="day3" scope="col">Quarta</th>
                <th class="day4" scope="col">Quinta</th>
                <th class="day5" scope="col">Sexta</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th class="hour" scope="row">08:00</th>
                <td class="monday" rowspan="2">HTML</td>
                <td class="tuesday">ADS</td>
                <td class="wednesday" rowspan="2">DEV</td>
                <td class="thursday">CSS</td>
                <td class="friday" rowspan="2">JS</td>
            </tr>
            <tr>
                <th class="hour" scope="row">09:00</th>
                <!--<td class="monday"></td>-->
                <td class="tuesday" rowspan="2">UX</td>
                <!--<td class="wednesday"></td>-->
                <td class="thursday" rowspan="2">UX</td>
                <!--<td class="friday"></td>-->
            </tr>
            <tr>
                <th class="hour" scope="row">10:00</th>
                <td class="monday">CSS</td>
                <!--<td class="tuesday"></td>-->
                <td class="wednesday">CSS</td>
                <!--<td class="thursday"></td>-->
                <td class="friday" rowspan="2">UX</td>
            </tr>
            <tr>
                <th class="hour" scope="row">11:00</th>
                <td class="monday">JS</td>
                <td class="tuesday">CSS</td>
                <td class="wednesday">HTML</td>
                <td class="thursday">ADS</td>
                <!--<td class="friday"></td>-->
            </tr>
            <tr>
                <th class="lunch-time" scope="row">12:00</th>
                <td class="lunch" colspan="5"><i class="fa-solid fa-bowl-rice"></i> ALMOÇO</td>
            </tr>
               <tr>
                <th class="hour" scope="row">13:00</th>
                <td class="monday">JS</td>
                <td class="tuesday">HTML</td>
                <td class="wednesday" rowspan="2">JS</td>
                <td class="thursday">JS</td>
                <td class="friday">CSS</td>
            </tr>
            <tr>
                <th class="hour" scope="row">14:00</th>
                <td class="monday" rowspan="2">ADS</td>
                <td class="tuesday" rowspan="2">UX</td>
                <!--<td class="wednesday"></td>-->
                <td class="thursday" rowspan="2">HTML</td>
                <td class="friday">HTML</td>
            </tr>
            <tr>
                <th class="hour" scope="row">15:00</th>
                <!--<td class="monday"></td>-->
                <!--<td class="tuesday"></td>-->
                <td class="wednesday" rowspan="2">ADS</td>
                <!--<td class="thursday"></td>-->
                <td class="friday" rowspan="2">ADS</td>
            </tr>
            <tr>
                <th class="hour" scope="row">16:00</th>
                <td class="monday">CSS</td>
                <td class="tuesday">ADS</td>
                <!--<td class="wednesday"></td>-->
                <td class="thursday">DEV</td>
                <!--<td class="friday"></td>-->
            </tr>
        </tbody>
    </table>
</body>
</html>
